<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>在线剪贴板</title>
</head>

<body>
<h1>在线剪贴板</h1>

<textarea id="t"></textarea>

<br>

<input id="pwd" placeholder="分享密码">
<input id="ttl" placeholder="有效期秒" value="86400">
<input id="max" placeholder="最大访问次数" value="1">

<label>
<input type="checkbox" id="burn"> 阅后即焚
</label>

<br><br>

<button onclick="save()">保存</button>
<button onclick="share()">分享</button>

<script>
const API = "https://YOUR-WORKER.workers.dev";

async function save(){
  await fetch(API+"/api/save",{method:"POST",body:t.value});
  alert("已保存");
}

async function share(){
  const res = await fetch(API+"/api/share",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      content: t.value,
      password: pwd.value,
      ttl: Number(ttl.value),
      maxViews: Number(max.value),
      burn: burn.checked
    })
  });

  const data = await res.json();
  alert("分享链接:\n" + data.url);
}
</script>

</body>
</html>
